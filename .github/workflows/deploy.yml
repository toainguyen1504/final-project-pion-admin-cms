name: Deploy Pion Admin CMS to Hosting v2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node + cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies (chuẩn CI)
      - name: Install dependencies
        run: npm ci --include=optional

      # 4. FIX Rollup native bug (QUAN TRỌNG)
      - name: Fix Rollup Linux Binary
        run: npm install @rollup/rollup-linux-x64-gnu --force

      # 5. Build Vite project
      - name: Build project
        run: npm run build

